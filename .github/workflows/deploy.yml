name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=pctgp-website --branch=main
      - name: Notify success
        if: success()
        run: |
          curl -s -X POST "${{ secrets.NTFY_URL }}" \
            -H "Authorization: Bearer ${{ secrets.NTFY_TOKEN }}" \
            -H "Title: check-printing built ✓" \
            -H "Priority: default" \
            -H "Tags: white_check_mark" \
            -d "Image pushed: ${{ env.IMAGE_NAME }}@${{ github.sha }}"

      - name: Notify failure
        if: failure()
        run: |
          curl -s -X POST "${{ secrets.NTFY_URL }}" \
            -H "Authorization: Bearer ${{ secrets.NTFY_TOKEN }}" \
            -H "Title: check-printing build failed ✗" \
            -H "Priority: high" \
            -H "Tags: x" \
            -d "Build failed on ${{ github.ref_name }} — ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"